version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: quiz_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - quiz_network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: quiz_backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/quiz-builder
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:8080
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quiz_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: quiz_frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - quiz_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  quiz_network:
    driver: bridge
